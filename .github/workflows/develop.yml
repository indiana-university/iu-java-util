# Description
# -----------
# This workflow is intended to run anytime there is a push on a `develop` branch. 

name: Develop Branch

on:
  push:
    branches: 
    - develop*
  workflow_dispatch:

env:
  TZ: America/Indianapolis

jobs:
  deploy:
    if: ( github.event_name == 'workflow_dispatch' || github.event_name == 'push' ) && startsWith(github.ref, 'refs/heads/develop')
    name: Verify and Deploy Maven Project
    runs-on: [ Linux ]
    container:
      image: registry.docker.iu.edu/esas-build-prod/esas-java-build
      credentials:
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
      volumes:
        - /opt/actions/cache/m2/repository:/root/.m2/repository

    services:
      postgres:
        image: postgres
        command: -c max_prepared_transactions=10
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PGTZ: America/Indiana/Indianapolis
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Create gitconfig
        run: echo -n '${{ secrets.GITCONFIG }}' > /tmp/.gitconfig

      - name: Clone GitHub repository
        uses: actions/checkout@v7
        env:
          GIT_CONFIG_GLOBAL: /tmp/.gitconfig

      - name: Create maven settings.xml
        run: echo -n '${{ secrets.MAVEN_SETTINGS }}' > /root/.m2/settings.xml

      - name: Compile and Build Javadoc
        id: compile
        run: |
          mvn clean verify -DskipTests -U --batch-mode

      - name: Verify Test Coverage
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TZ: America/Indiana/Indianapolis
        run: |
          mvn verify -Dmaven.javadoc.skip --batch-mode
          
      - name: Deploy Artifacts
        run: |
          mvn deploy -DskipTests --batch-mode

      - name: Publish Documentation
        if: steps.compile.outcome == 'success'
        run: |
          publish_docs
